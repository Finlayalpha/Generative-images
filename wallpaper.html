<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Particle Lenia — Living Wallpaper</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  #c { display: block; width: 100vw; height: 100vh; }
  #fallback {
    position: fixed; inset: 0; display: none; place-items: center;
    color: #9aa; font: 14px/1.5 -apple-system, system-ui, sans-serif; text-align: center; padding: 2rem;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fallback">This needs WebGL2.<br />Open in a recent Safari, Chrome, or Firefox.</div>

<script>
"use strict";
/* ===========================================================================
   Particle Lenia — a hands-off, perpetually moving living wallpaper.

   Grid-based Lenia / SmoothLife settle into static spatial patterns (spots,
   labyrinths) because the lattice locks into a fixed point. Particle Lenia
   (Mordvintsev et al., Google Research) removes the grid: it simulates a fixed
   set of particles whose motion is a gradient flow on an energy field, so the
   particles are intrinsically MOVING and self-organize into living "cells" that
   drift, rotate, merge and split — they cannot freeze into a lattice.

   Per particle i:
     U_i = Σ_j K(|p_i - p_j|)                      (Lenia field, ring kernel K)
     E(x) = R(x) - G(U(x))                         (energy: repulsion - growth)
       K(r) = w_k·exp(-((r-μ_k)/σ_k)²)
       G(u) = exp(-((u-μ_g)/σ_g)²)
       R(x) = (c_rep/2)·Σ_j max(1-|x-p_j|, 0)²
     dp_i/dt = -∇E(p_i)                            (move down the energy gradient)

   A whisper of thermal noise guarantees it never settles. No controls, no UI;
   tasteful slowly-drifting colour. Defaults are Google Research's.
   =========================================================================== */

const CONFIG = {
  // World is measured in Lenia units (a "cell" is ~2·μ_k ≈ 8 units across).
  // Lower density (fewer particles in a larger world) keeps the cells DISCRETE —
  // a handful of separate "creatures" with black space between them, rather than
  // a space-filling foam.
  worldHeight: 48,        // world height in units; width follows the aspect ratio
  nParticles: 700,
  substeps: 2,            // sim steps per displayed frame
  dt: 0.1,

  // Particle Lenia parameters (Google Research defaults).
  mu_k: 4.0, sigma_k: 1.0, w_k: 0.022,
  mu_g: 0.6, sigma_g: 0.15,
  c_rep: 1.0,

  // Active matter: each particle self-propels along a slowly-wandering heading,
  // so the system stays out of equilibrium and the creatures keep swimming,
  // colliding, merging and splitting forever (a stable population of ~10).
  v0: 0.20,               // self-propulsion speed (higher = friskier, too high frays cells)
  turn: 0.4,              // per-step heading wander (radians)
  noise: 0.004,           // small extra translational jitter
  maxDPR: 1.5,
  fps: 30,

  look: {
    pointSize: 0.10,      // glow radius (big enough to fuse a cluster's particles
                          // into one smooth, cohesive-looking cell)
    gain: 0.24, gamma: 0.70, vignette: 0.12,   // static heat ramp (denser = hotter)
  },
};

/* ===========================================================================
   WebGL plumbing
   =========================================================================== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, depth: false,
                                         powerPreference: 'low-power', premultipliedAlpha: false });
if (!gl) { document.getElementById('fallback').style.display = 'grid'; throw new Error('WebGL2 unavailable'); }
if (!gl.getExtension('EXT_color_buffer_float')) {
  const f = document.getElementById('fallback');
  f.style.display = 'grid';
  f.textContent = "This GPU/browser can't render to float textures. Try a recent Safari/Chrome/Firefox.";
  throw new Error('EXT_color_buffer_float unavailable');
}

function compile(t, s) {
  const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh) + '\n' + s);
  return sh;
}
function program(v, f) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, v));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, f));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  p._c = {}; p._u = n => (n in p._c) ? p._c[n] : (p._c[n] = gl.getUniformLocation(p, n));
  return p;
}

// Particle splats: additive glow points.
const PT_V = `#version 300 es
layout(location=0) in vec2 aPos;
uniform vec2 uWorld;
uniform float uPointSize;
void main(){
  vec2 clip = aPos / uWorld * 2.0 - 1.0;
  gl_Position = vec4(clip.x, clip.y, 0.0, 1.0);
  gl_PointSize = uPointSize;
}`;
const PT_F = `#version 300 es
precision highp float;
out vec4 o;
void main(){
  vec2 d = gl_PointCoord - 0.5;
  float v = exp(-dot(d, d) * 18.0);     // tighter gaussian splat (sharper)
  o = vec4(v, 0.0, 0.0, 1.0);
}`;

// Colour pass: static heatmap — denser mass reads "hotter".
const COL_V = `#version 300 es
void main(){ vec2 p = vec2(float((gl_VertexID<<1)&2), float(gl_VertexID&2)); gl_Position = vec4(p*2.0-1.0,0.,1.); }`;
const COL_F = `#version 300 es
precision highp float;
uniform sampler2D uAcc;
uniform vec2 uRes;
uniform float uGain, uGamma, uVignette;
out vec4 outColor;
// Inferno-style heat ramp: black -> indigo -> crimson -> orange -> yellow -> white.
vec3 heat(float t){
  t = clamp(t, 0.0, 1.0);
  const vec3 c0 = vec3(0.00, 0.00, 0.00);
  const vec3 c1 = vec3(0.13, 0.05, 0.28);
  const vec3 c2 = vec3(0.47, 0.11, 0.42);
  const vec3 c3 = vec3(0.78, 0.20, 0.24);
  const vec3 c4 = vec3(0.96, 0.49, 0.12);
  const vec3 c5 = vec3(0.99, 0.81, 0.22);
  const vec3 c6 = vec3(1.00, 1.00, 0.96);
  if (t < 0.20) return mix(c0, c1, t / 0.20);
  if (t < 0.40) return mix(c1, c2, (t - 0.20) / 0.20);
  if (t < 0.60) return mix(c2, c3, (t - 0.40) / 0.20);
  if (t < 0.78) return mix(c3, c4, (t - 0.60) / 0.18);
  if (t < 0.91) return mix(c4, c5, (t - 0.78) / 0.13);
  return mix(c5, c6, (t - 0.91) / 0.09);
}
void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  float d = texture(uAcc, uv).r;
  float t = pow(clamp(d * uGain, 0.0, 1.0), uGamma);
  vec3 col = heat(t);
  vec2 q = uv - 0.5; col *= 1.0 - uVignette * dot(q, q) * 2.0;
  outColor = vec4(max(col, 0.0), 1.0);
}`;

const progPt = program(PT_V, PT_F);
const progCol = program(COL_V, COL_F);
const vao = gl.createVertexArray();
const posBuf = gl.createBuffer();
const colVao = gl.createVertexArray();   // empty VAO for the fullscreen pass

/* ===========================================================================
   Particle state + world
   =========================================================================== */
const N = CONFIG.nParticles;
const px = new Float32Array(N), py = new Float32Array(N);
const th = new Float32Array(N);          // self-propulsion heading per particle
const U  = new Float32Array(N);
const upload = new Float32Array(N * 2);
let worldW, worldH;

function initParticles() {
  worldH = CONFIG.worldHeight;
  worldW = worldH * (canvas.width / canvas.height);
  for (let i = 0; i < N; i++) {
    px[i] = Math.random() * worldW; py[i] = Math.random() * worldH;
    th[i] = Math.random() * Math.PI * 2;
  }
}

let accTex, accFbo;
function allocate() {
  const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxDPR);
  canvas.width = Math.max(2, Math.floor(window.innerWidth * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));
  const newW = CONFIG.worldHeight * (canvas.width / canvas.height);
  if (!worldW) initParticles();
  else { for (let i = 0; i < N; i++) px[i] *= newW / worldW; worldW = newW; }  // keep particles on screen

  if (accTex) { gl.deleteTexture(accTex); gl.deleteFramebuffer(accFbo); }
  accTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, accTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.R16F, canvas.width, canvas.height, 0, gl.RED, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  accFbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, accFbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, accTex, 0);
}

/* ===========================================================================
   Particle Lenia simulation (CPU). Spatial hash for O(N) neighbour queries.
   =========================================================================== */
const { mu_k, sigma_k, w_k, mu_g, sigma_g, c_rep, dt } = CONFIG;
const cutoff = mu_k + 4 * sigma_k;        // beyond this the kernel is ~0
let gw, gh, cell;                         // hash grid
let heads, next;                          // linked-list buckets

function buildGrid() {
  cell = cutoff;
  gw = Math.max(1, Math.ceil(worldW / cell));
  gh = Math.max(1, Math.ceil(worldH / cell));
  if (!heads || heads.length !== gw * gh) heads = new Int32Array(gw * gh);
  if (!next) next = new Int32Array(N);
  heads.fill(-1);
  for (let i = 0; i < N; i++) {
    let cx = Math.floor(px[i] / cell), cy = Math.floor(py[i] / cell);
    cx = ((cx % gw) + gw) % gw; cy = ((cy % gh) + gh) % gh;
    const b = cx + cy * gw;
    next[i] = heads[b]; heads[b] = i;
  }
}

function step() {
  buildGrid();
  const halfW = worldW * 0.5, halfH = worldH * 0.5;

  // Pass 1: field U_i at each particle.
  for (let i = 0; i < N; i++) {
    const xi = px[i], yi = py[i];
    let cx = Math.floor(xi / cell), cy = Math.floor(yi / cell);
    cx = ((cx % gw) + gw) % gw; cy = ((cy % gh) + gh) % gh;
    let u = 0;
    for (let oy = -1; oy <= 1; oy++) for (let ox = -1; ox <= 1; ox++) {
      const b = (((cx + ox) % gw + gw) % gw) + (((cy + oy) % gh + gh) % gh) * gw;
      for (let j = heads[b]; j !== -1; j = next[j]) {
        if (j === i) continue;
        let dx = xi - px[j], dy = yi - py[j];
        if (dx > halfW) dx -= worldW; else if (dx < -halfW) dx += worldW;
        if (dy > halfH) dy -= worldH; else if (dy < -halfH) dy += worldH;
        const r = Math.sqrt(dx*dx + dy*dy);
        if (r >= cutoff) continue;
        const q = (r - mu_k) / sigma_k;
        u += w_k * Math.exp(-q * q);
      }
    }
    U[i] = u;
  }

  // Pass 2: force = -∇E(p_i) = -∇R + G'(U_i)·∇U, then integrate (+ noise).
  for (let i = 0; i < N; i++) {
    const xi = px[i], yi = py[i];
    let cx = Math.floor(xi / cell), cy = Math.floor(yi / cell);
    cx = ((cx % gw) + gw) % gw; cy = ((cy % gh) + gh) % gh;
    const pg = (U[i] - mu_g) / sigma_g;
    const Gp = Math.exp(-pg * pg) * (-2 * pg / sigma_g);   // G'(U_i)
    let guX = 0, guY = 0, grX = 0, grY = 0;
    for (let oy = -1; oy <= 1; oy++) for (let ox = -1; ox <= 1; ox++) {
      const b = (((cx + ox) % gw + gw) % gw) + (((cy + oy) % gh + gh) % gh) * gw;
      for (let j = heads[b]; j !== -1; j = next[j]) {
        if (j === i) continue;
        let dx = xi - px[j], dy = yi - py[j];
        if (dx > halfW) dx -= worldW; else if (dx < -halfW) dx += worldW;
        if (dy > halfH) dy -= worldH; else if (dy < -halfH) dy += worldH;
        let r = Math.sqrt(dx*dx + dy*dy);
        if (r >= cutoff) continue;
        if (r < 1e-4) r = 1e-4;
        const ux = dx / r, uy = dy / r;
        const q = (r - mu_k) / sigma_k;
        const K = w_k * Math.exp(-q * q);
        const dK = K * (-2 * q / sigma_k);                 // dK/dr
        guX += dK * ux; guY += dK * uy;
        if (r < 1.0) { const dR = -c_rep * (1.0 - r); grX += dR * ux; grY += dR * uy; }  // dRrep/dr
      }
    }
    // force = -gradR + G'(U)·gradU
    let fx = -grX + Gp * guX, fy = -grY + Gp * guY;
    // Active self-propulsion: wander the heading, then drive along it.
    th[i] += (Math.random() - 0.5) * CONFIG.turn;
    fx += CONFIG.v0 * Math.cos(th[i]) + (Math.random() - 0.5) * CONFIG.noise;
    fy += CONFIG.v0 * Math.sin(th[i]) + (Math.random() - 0.5) * CONFIG.noise;
    let nx = xi + dt * fx, ny = yi + dt * fy;
    nx -= Math.floor(nx / worldW) * worldW;               // torus wrap
    ny -= Math.floor(ny / worldH) * worldH;
    px[i] = nx; py[i] = ny;
  }
}

/* ===========================================================================
   Render
   =========================================================================== */
function render(time) {
  for (let i = 0; i < N; i++) { upload[i*2] = px[i]; upload[i*2+1] = py[i]; }

  // Pass 1: accumulate glow.
  gl.bindFramebuffer(gl.FRAMEBUFFER, accFbo);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE);
  gl.useProgram(progPt);
  gl.bindVertexArray(vao);
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, upload, gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.uniform2f(progPt._u('uWorld'), worldW, worldH);
  gl.uniform1f(progPt._u('uPointSize'), Math.max(2, CONFIG.look.pointSize * canvas.height));
  gl.drawArrays(gl.POINTS, 0, N);
  gl.disable(gl.BLEND);

  // Pass 2: colour map.
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(progCol);
  gl.bindVertexArray(colVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, accTex);
  gl.uniform1i(progCol._u('uAcc'), 0);
  gl.uniform2f(progCol._u('uRes'), canvas.width, canvas.height);
  gl.uniform1f(progCol._u('uGain'), CONFIG.look.gain);
  gl.uniform1f(progCol._u('uGamma'), CONFIG.look.gamma);
  gl.uniform1f(progCol._u('uVignette'), CONFIG.look.vignette);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

/* ===========================================================================
   Loop
   =========================================================================== */
let running = true, lastFrame = 0;
function frame(tMs) {
  if (!running) return;
  requestAnimationFrame(frame);
  if (tMs - lastFrame < 1000 / CONFIG.fps) return;
  lastFrame = tMs;
  for (let s = 0; s < CONFIG.substeps; s++) step();
  render(tMs / 1000);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) running = false;
  else if (!running) { running = true; lastFrame = 0; requestAnimationFrame(frame); }
});
let resizeTimer = null;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(allocate, 200); });

allocate();
requestAnimationFrame(frame);
</script>
</body>
</html>
