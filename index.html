<div id="fallback">This needs WebGL2.<br />Open in a recent Safari, Chrome, or Firefox.</div>

<script>
"use strict";
/* ===========================================================================
   Lenia â€” a hands-off living wallpaper.

   Lenia is the continuous generalization of Conway's Game of Life. Its famous
   gliding "lifeforms" do NOT reliably emerge from random soup (soup settles
   into static Turing patterns); they're specific patterns discovered by search
   and then seeded. So we embed REAL creatures (from Bert Chan's collection) and
   let them swim, then slowly cycle through the zoo forever.

   No controls, no settings, no UI. It just runs:
     - seeds a school of one creature, aligned so they glide together on a torus
     - lets them swim (and wrap around) for a while
     - gently fades to black, switches to the next creature, repeats
     - colour drifts slowly and tastefully through the spectrum

   All creatures here are single-kernel (b=1, R=13, T=10), differing only in the
   growth mean m / width s and their seed pattern.
   =========================================================================== */

const CONFIG = {
  simLongAxis: 360,   // sim grid on its long side (small = bigger creatures + lighter)
  maxDPR: 1.5,
  fps: 30,
  R: 13,              // creature native kernel radius
  dt: 0.1,            // 1 / T
  cycleSec: 32,       // seconds per creature before switching
  fadeSec: 1.6,       // fade-to-black duration around each switch
  seedCount: 9,       // creatures stamped per cycle
  topUpSec: 6,        // occasionally add one more so the school stays populated
  alignJitter: 0.5,   // radians of orientation spread within the school
  look: { gain: 1.3, gamma: 0.8, glow: 0.45, vignette: 0.12, hueSpeed: 1 / 240 },
};

// Real Lenia creatures (Chan's collection). cells = run-length-encoded pattern.

  { name: 'Discutium solidus', m: 0.356, s: 0.063,
    cells: "8.AEG2JHFB$6.HUpKpWqGqKqLqHpXpOpCOE$4.FpCqGrGsCsQtBtEtDsUsMrXrIqNpRVF$3.MqArPtDuHvDvPvUvVvSvMvAuMtTsWrWqUpRQA$2.MqMsSuSwIxKyDyKyMyKyFxUxKwUwCvGuGtCrTqKpBD$.DqKtHvWyC10yOyHxLwLvHtXsMqUpHE$.pMsWwG14yOyMxJwBuOsVrBpHD$.rLvM6yOyLyDyByGyL6yOyAwOuVsXqVX$VtMxS5yOyGwR2vXwJxCxTyI5yOyLwTuUsOqHM$qGvDyM5yOvWtRtDtHtWuTvSwRxNyEyN4yOwRuJrUpKB$rKwFxXyK3yOxRsJqNqIqSrMsJtIuIvHwIxJyH3yOyMwDtJqOL$sCwLwWxU3yOuRT2.GpBqAqXrXsXuBvIwWwYH3yOxTuVrSpB$sHuSvLxAyK2yOrO6.OpOqPrTtFvDxJ4yOwGsUpRA$rXsStVvVxW2yOpO8.IpOrEtJwM4yOxLtSqGC$qBqQsFuPxByLxWqWV9.pFrWwD4yOyJuIqOD$.NqOtGvTxPuLsDqUpKJ8.rDxD5yOuOqOB$2.WrRuFwDrP2rTrHqLpJL6.sK6yOuIqE$3.qBsIrPpKqAqOrBrIrFqOpTXJCBKxI5yOxXtMpI$3.HqJ3.HpBpVqQrGrKrEqQqHqGuE4yOyMyNwNsBB$11.NpNqLrFrTsDsO2yOyNyE2xSyCuLqA$13.GpLqNrPuKyDxUxDwJwCwLvUrV$15.NpTwDwCvMuPtXuCvAsVS$16.GtNtIsPrTrLsDsTpL$16.pEqSqIpNVpBqFpH$16.A5.G!" },
  { name: 'Parorbium dividuus', m: 0.174, s: 0.022,
    cells: "37.G$37.pN$29.KXO5.WK$28.GpV2qP2pApBSG.tC$28.pLrGsGsKrOqB2qCqApLuX$21.F4.RpHqIsBtAsVrSpLpEpHpSqLuNsI$21.pW2.MpJpTpWpSrDrUrRqRA2.BUrLxM$16.A4.pJOPpSpWpKTJpIqLqSqMpR4.MyBpA$16.qW5.sXpTqFXB2.pCqPrOrTrK5.tOuL$6.LpAR7.rL5.vIqTpN4.VrSsXtNtJqS4.pOvO$5.BpPqKqIpORpFpL2pOpHqGsG4.vKrTO4.ItAuJvBvCuIE3.GuEX$5.AqSrWsFrOqBpXpSpRpTqHqKvV4.tHvL6.uEvSwOwVwJrR3.JsRqD$4.UpMrWtBsXrVpXQHCGTqJwSqN3.qFxL6.uMwXyAyHyEvHpO2.pBrWqF$qV2.pEpXqDrKsArUqRpA5.GtGwD4.xJ6.uCyC3yOyBsOpFQpWrPpV$rU.XqCpSVKqHqSqOpX6.HyAL3.vGqX5.tJ4yOyNuRrFqEqTrKpH$qJrWqBpTN2.qGrJrTrQqM6.uVsS3.sCtB4.DsTyDyOyIyFxPvEsL2rJqWN$.vQqPS3.rHsQtItKsU6.rDuE3.pJsRqHA2.pBsJwHxQxIwUwIuSsWrXrIqBB$.xIqL4.rTuAuWvEuVrL5.pNtJV2.AqQrLpWXpBqCsCuM2vUvNuUtTsQrSqPX$.pAwE4.qLxM4yOvRqNIAWqJqPM6.LpFpVqNqXrGrIrDqRqEpIK$.qSPpVpF9.qWsLtLuAuDtUtDrN12.pFpMpOpMpFPD$2.vCqE3.qJwT4yOxEsXqHpRqDqRpRA8.EPpFpMpOpMpFPD$2.sBsKM2.qKvO2yOyCxVwSuArUrAqUqIQ12.BEC$2.VsOqSpCpBqSuEwXxJwWwOvOtVsIrMqQpI$3.qJrQqUqJrFtBuXvRvQvFuKtEsCrDpRH$3.HqLrJrIrOsMtM2uCtQtAsErGqCO$4.KqBrArKrUsFsLsMsFrQqXqBT$5.FpHqFqQrBrErCqSqJpPQ$7.KpApLpPpOpJUJ$10.2D!" },
];

/* ===========================================================================
   RLE decoder for Chan's creature "cells" strings
   =========================================================================== */
function decodeCells(str) {
  const rows = []; let row = [], num = '', i = 0;
  const flush = (v, n) => { for (let k = 0; k < n; k++) row.push(v / 255); };
  while (i < str.length) {
    const c = str[i];
    if (c >= '0' && c <= '9') { num += c; i++; continue; }
    if (c === '!') break;
    if (c === '$') { const n = num ? +num : 1; num = ''; rows.push(row); for (let k = 1; k < n; k++) rows.push([]); row = []; i++; continue; }
    let v;
    if (c === '.' || c === 'b') { v = 0; i++; }
    else if (c === 'o') { v = 255; i++; }
    else if (c >= 'p' && c <= 'y') { v = (c.charCodeAt(0) - 112) * 24 + (str.charCodeAt(i + 1) - 65) + 25; i += 2; }
    else { v = c.charCodeAt(0) - 64; i++; }                       // 'A'..'X' -> 1..24
    v = Math.max(0, Math.min(255, v));
    const n = num ? +num : 1; num = '';
    flush(v, n);
  }
  if (row.length) rows.push(row);
  const w = rows.reduce((m, r) => Math.max(m, r.length), 1), h = rows.length;
  const data = new Float32Array(w * h);
  for (let y = 0; y < h; y++) for (let x = 0; x < rows[y].length; x++) data[y * w + x] = rows[y][x];
  return { w, h, data };
}

/* ===========================================================================
   WebGL plumbing
   =========================================================================== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, depth: false,
                                         powerPreference: 'low-power', premultipliedAlpha: false });
if (!gl) { document.getElementById('fallback').style.display = 'grid'; throw new Error('WebGL2 unavailable'); }
if (!gl.getExtension('EXT_color_buffer_float')) {
  const f = document.getElementById('fallback');
  f.style.display = 'grid';
  f.textContent = "This GPU/browser can't render to float textures. Try a recent Safari/Chrome/Firefox.";
  throw new Error('EXT_color_buffer_float unavailable');
}
const floatLinear = !!gl.getExtension('OES_texture_float_linear');

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s) + '\n' + src);
  return s;
}
function program(vsrc, fsrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  p._c = {}; p._u = n => (n in p._c) ? p._c[n] : (p._c[n] = gl.getUniformLocation(p, n));
  return p;
}

const VERT = `#version 300 es
void main(){ vec2 p = vec2(float((gl_VertexID<<1)&2), float(gl_VertexID&2)); gl_Position = vec4(p*2.0-1.0,0.,1.); }`;

// Lenia update with the exponential "bump" kernel exp(4 - 1/(r(1-r))).
const FRAG_LENIA = `#version 300 es
precision highp float;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform float uR, uM, uS, uDt;
out vec4 outColor;
float kcore(float r){ return (r<=0.0 || r>=1.0) ? 0.0 : exp(4.0 - 1.0/(r*(1.0-r))); }
void main(){
  vec2 uv = gl_FragCoord.xy * uTexel;
  float a = texture(uState, uv).r;
  float sum = 0.0, wsum = 0.0;
  int iR = int(ceil(uR));
  for (int dy=-iR; dy<=iR; dy++) for (int dx=-iR; dx<=iR; dx++){
    vec2 off = vec2(float(dx), float(dy));
    float r = length(off) / uR;
    if (r < 1.0){ float k = kcore(r); sum += k * texture(uState, uv + off*uTexel).r; wsum += k; }
  }
  float u = sum / max(wsum, 1e-9);
  float g = 2.0 * exp(-0.5 * pow((u - uM) / uS, 2.0)) - 1.0;
  outColor = vec4(clamp(a + uDt * g, 0.0, 1.0), 0.0, 0.0, 1.0);
}`;

// Stamp a creature into the field at a position / rotation / flip (max-composite).
const FRAG_STAMP = `#version 300 es
precision highp float;
uniform sampler2D uState, uCre;
uniform vec2 uTexel, uCreSize, uCenter;
uniform float uCos, uSin, uFlip;
out vec4 outColor;
void main(){
  float base = texture(uState, gl_FragCoord.xy * uTexel).r;
  vec2 P = gl_FragCoord.xy - uCenter;
  vec2 L = vec2(P.x*uCos + P.y*uSin, -P.x*uSin + P.y*uCos);
  L.x *= uFlip;
  vec2 cuv = L / uCreSize + 0.5;
  float v = 0.0;
  if (cuv.x>=0.0 && cuv.x<=1.0 && cuv.y>=0.0 && cuv.y<=1.0) v = texture(uCre, cuv).r;
  outColor = vec4(max(base, v), 0.0, 0.0, 1.0);
}`;

// Display: bicubic upscale, black background, single slowly-drifting accent.
const FRAG_COLOR = `#version 300 es
precision highp float;
uniform sampler2D uState;
uniform vec2 uResolution, uSimSize, uSimTexel;
uniform float uGain, uGamma, uGlow, uVignette, uHue, uFade;
out vec4 outColor;
float field(vec2 uv){ return texture(uState, uv).r; }
float fetch(ivec2 p){ ivec2 s = ivec2(uSimSize); p = ((p % s) + s) % s; return texelFetch(uState, p, 0).r; }
vec4 cm(float x){ float x2=x*x,x3=x2*x; return vec4(-0.5*x3+x2-0.5*x, 1.5*x3-2.5*x2+1.0, -1.5*x3+2.0*x2+0.5*x, 0.5*x3-0.5*x2); }
float fieldCubic(vec2 uv){
  vec2 c = uv*uSimSize - 0.5; vec2 f = fract(c); ivec2 i = ivec2(floor(c));
  vec4 wx = cm(f.x), wy = cm(f.y); float r = 0.0;
  for (int m=-1;m<=2;m++){ float row=0.0; for(int n=-1;n<=2;n++) row += wx[n+1]*fetch(i+ivec2(n,m)); r += wy[m+1]*row; }
  return r;
}
vec3 accent(float h){ return 0.55 + 0.45*cos(6.28318*(h + vec3(0.0,0.20,0.40))); }
vec3 shade(float v, vec3 ac){
  float t = pow(clamp(v*uGain,0.0,1.0), uGamma);
  vec3 col = mix(vec3(0.0), ac, smoothstep(0.0,0.55,t));     // black -> accent
  col = mix(col, vec3(1.0), smoothstep(0.80,1.0,t)*0.6);     // hot cores -> white
  return col;
}
void main(){
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec3 ac = accent(uHue);
  vec3 col = shade(clamp(fieldCubic(uv),0.0,1.0), ac);
  if (uGlow > 0.0){
    vec2 o = uSimTexel*1.5;
    float b = field(uv+vec2(o.x,0.))+field(uv-vec2(o.x,0.))+field(uv+vec2(0.,o.y))+field(uv-vec2(0.,o.y))
            + field(uv+o)+field(uv-o)+field(uv+vec2(o.x,-o.y))+field(uv+vec2(-o.x,o.y));
    col += shade(b*0.125, ac) * uGlow;
  }
  col *= uFade;
  vec2 q = uv - 0.5; col *= 1.0 - uVignette*dot(q,q)*2.0;
  outColor = vec4(max(col,0.0), 1.0);
}`;

const progLenia = program(VERT, FRAG_LENIA);
const progStamp = program(VERT, FRAG_STAMP);
const progColor = program(VERT, FRAG_COLOR);
gl.bindVertexArray(gl.createVertexArray());

// Build a sampled texture for each creature once.
const CRE = CREATURES.map(c => {
  const { w, h, data } = decodeCells(c.cells);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, w, h, 0, gl.RED, gl.FLOAT, data);
  const filt = floatLinear ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return { tex, w, h, m: c.m, s: c.s, name: c.name };
});

/* ===========================================================================
   Ping-pong simulation textures
   =========================================================================== */
let texA, texB, simW, simH, src, dst;
function makeTarget(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RG16F, w, h, 0, gl.RG, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);   // torus: gliders wrap forever
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fbo };
}
function allocate() {
  const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxDPR);
  canvas.width = Math.max(2, Math.floor(window.innerWidth * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));
  const aspect = canvas.width / canvas.height;
  if (aspect >= 1) { simW = CONFIG.simLongAxis; simH = Math.max(8, Math.round(CONFIG.simLongAxis / aspect)); }
  else { simH = CONFIG.simLongAxis; simW = Math.max(8, Math.round(CONFIG.simLongAxis * aspect)); }
  if (texA) { gl.deleteTexture(texA.tex); gl.deleteFramebuffer(texA.fbo); }
  if (texB) { gl.deleteTexture(texB.tex); gl.deleteFramebuffer(texB.fbo); }
  texA = makeTarget(simW, simH); texB = makeTarget(simW, simH);
  startCycle(curIdx, performance.now() / 1000);
}

/* ===========================================================================
   Seeding & cycling
   =========================================================================== */
let curIdx = 0, cycleStart = 0, lastTopUp = 0, baseAngle = 0, baseFlip = 1;

function clearField() {
  for (const t of [texA, texB]) { gl.bindFramebuffer(gl.FRAMEBUFFER, t.fbo); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
  src = texA; dst = texB;
}
function stampCreature(cre, cx, cy, angle, flip) {
  gl.useProgram(progStamp);
  gl.viewport(0, 0, simW, simH);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, cre.tex);
  gl.uniform1i(progStamp._u('uState'), 0);
  gl.uniform1i(progStamp._u('uCre'), 1);
  gl.uniform2f(progStamp._u('uTexel'), 1/simW, 1/simH);
  gl.uniform2f(progStamp._u('uCreSize'), cre.w, cre.h);
  gl.uniform2f(progStamp._u('uCenter'), cx, cy);
  gl.uniform1f(progStamp._u('uCos'), Math.cos(angle));
  gl.uniform1f(progStamp._u('uSin'), Math.sin(angle));
  gl.uniform1f(progStamp._u('uFlip'), flip);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  [src, dst] = [dst, src];
}
function seedSchool(cre) {
  const n = CONFIG.seedCount, aspect = simW / simH;
  let cols = Math.max(1, Math.round(Math.sqrt(n * aspect))), rows = Math.ceil(n / cols), placed = 0;
  for (let r = 0; r < rows && placed < n; r++) for (let c = 0; c < cols && placed < n; c++, placed++) {
    const cx = (c + 0.5 + (Math.random()-0.5)*0.5) / cols * simW;
    const cy = (r + 0.5 + (Math.random()-0.5)*0.5) / rows * simH;
    stampCreature(cre, cx, cy, baseAngle + (Math.random()-0.5)*CONFIG.alignJitter, baseFlip);
  }
}
function startCycle(idx, time) {
  curIdx = idx;
  cycleStart = time; lastTopUp = time;
  baseAngle = Math.random() * Math.PI * 2;
  baseFlip = Math.random() < 0.5 ? 1 : -1;
  clearField();
  seedSchool(CRE[idx]);
}

/* ===========================================================================
   Steps & render
   =========================================================================== */
function simStep() {
  const cre = CRE[curIdx];
  gl.useProgram(progLenia);
  gl.viewport(0, 0, simW, simH);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(progLenia._u('uState'), 0);
  gl.uniform2f(progLenia._u('uTexel'), 1/simW, 1/simH);
  gl.uniform1f(progLenia._u('uR'), CONFIG.R);
  gl.uniform1f(progLenia._u('uM'), cre.m);
  gl.uniform1f(progLenia._u('uS'), cre.s);
  gl.uniform1f(progLenia._u('uDt'), CONFIG.dt);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  [src, dst] = [dst, src];
}
function display(time, fade) {
  const lk = CONFIG.look;
  gl.useProgram(progColor);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(progColor._u('uState'), 0);
  gl.uniform2f(progColor._u('uResolution'), canvas.width, canvas.height);
  gl.uniform2f(progColor._u('uSimSize'), simW, simH);
  gl.uniform2f(progColor._u('uSimTexel'), 1/simW, 1/simH);
  gl.uniform1f(progColor._u('uGain'), lk.gain);
  gl.uniform1f(progColor._u('uGamma'), lk.gamma);
  gl.uniform1f(progColor._u('uGlow'), lk.glow);
  gl.uniform1f(progColor._u('uVignette'), lk.vignette);
  gl.uniform1f(progColor._u('uHue'), (time * lk.hueSpeed) % 1);
  gl.uniform1f(progColor._u('uFade'), fade);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

const ss = x => { x = x < 0 ? 0 : x > 1 ? 1 : x; return x * x * (3 - 2 * x); };
let running = true, lastFrame = 0;
function frame(tMs) {
  if (!running) return;
  requestAnimationFrame(frame);
  if (tMs - lastFrame < 1000 / CONFIG.fps) return;
  lastFrame = tMs;
  const time = tMs / 1000;

  let phase = time - cycleStart;
  if (phase >= CONFIG.cycleSec) { startCycle((curIdx + 1) % CRE.length, time); phase = 0; }
  else if (time - lastTopUp > CONFIG.topUpSec) {
    lastTopUp = time;
    stampCreature(CRE[curIdx], Math.random()*simW, Math.random()*simH,
                  baseAngle + (Math.random()-0.5)*CONFIG.alignJitter, baseFlip);
  }
  simStep();
  const f = CONFIG.fadeSec;
  display(time, ss(phase / f) * ss((CONFIG.cycleSec - phase) / f));
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) running = false;
  else if (!running) { running = true; lastFrame = 0; requestAnimationFrame(frame); }
});
let resizeTimer = null;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(allocate, 200); });

allocate();
requestAnimationFrame(frame);
</script>
</body>
