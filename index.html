<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Generative — Living Wallpaper</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  html, body, canvas { cursor: none; } /* hide cursor for screensaver use */
  #c { display: block; width: 100vw; height: 100vh; }
  #fallback {
    position: fixed; inset: 0; display: none; place-items: center;
    color: #9aa; font: 14px/1.5 -apple-system, system-ui, sans-serif; text-align: center; padding: 2rem;
  }
  /* On-screen hint / status. Fades out by itself; press H to toggle. */
  #hud {
    position: fixed; left: 18px; bottom: 16px; max-width: 90vw;
    color: rgba(255,255,255,0.82); font: 12px/1.5 -apple-system, system-ui, sans-serif;
    background: rgba(0,0,0,0.35); padding: 8px 12px; border-radius: 8px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    pointer-events: none; user-select: none; opacity: 0; transition: opacity 0.6s ease;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #hud b { color: #fff; font-weight: 600; }
  #hud .keys { color: rgba(255,255,255,0.55); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fallback">This needs WebGL2.<br />Open in a recent Safari, Chrome, or Firefox.</div>
<div id="hud"></div>

<script>
"use strict";
/* ===========================================================================
   Generative — a living, endlessly evolving wallpaper.  One file, no
   dependencies, fully offline.

   Two "minimum-rule" systems you can switch between live:

     • LENIA  — a continuous generalization of Conway's Game of Life. One
                update rule: convolve with a (multi-)ring kernel, pass through a
                smooth bell-shaped growth function, add a sliver back.
     • GRAY-SCOTT — reaction-diffusion. Two coupled equations -> coral/Turing
                patterns. Reliably fluid and ever-moving.

   Live controls (also shown on screen):
     G  switch system (Lenia <-> Gray-Scott)      P  cycle preset
     C  cycle palette                             S  toggle date/time effects
     R  reseed        Space  pause/resume         H  show/hide this hint
     click  drop a fresh patch where you click

   Tweak defaults in CONFIG / the PRESETS / PALETTES below.
   =========================================================================== */

const CONFIG = {
  // Which system & presets to start with (indices into the arrays below).
  rule: 'lenia',           // 'lenia' | 'gray-scott'
  leniaPreset: 0,
  gsPreset: 0,
  palette: 0,

  // ---- Performance (the "don't bog down my computer" knobs) ----------------
  // The sim runs at a fraction of screen res and is upscaled with smooth
  // bicubic filtering, so a low simScale stays smooth AND light.
  simScale: 0.5,
  maxSimDim: 800,          // hard cap on the longest sim axis
  maxDPR: 1.5,             // cap device pixel ratio for the display pass
  fps: 30,
  stepsPerFrame: { lenia: 1, 'gray-scott': 8 },

  // ---- Keep it endless: drop fresh "soup" now and then ---------------------
  reseed: {
    intervalSec: 4,        // how often to consider dropping a patch
    probability: 0.9,
    radiusFrac: 0.14,      // patch radius as a fraction of the smaller sim axis
    amount: 0.7,
  },

  // ---- Look ----------------------------------------------------------------
  // Empty space is black; field value drives brightness + colour up a palette.
  look: {
    gain: 1.4,     // contrast of the field before colouring
    gamma: 0.85,   // brightness ramp (<1 lifts mids / more glow)
    exposure: 1.15,
    glow: 0.5,     // soft bloom around bright regions
    vignette: 0.12,
  },

  // ---- Date/time modulation (all offline). OFF by default -------------------
  // When enabled, colour/brightness/speed and a seasonal parameter drift follow
  // new Date(). Toggle live with S.
  systemData: {
    enabled: false,
    nightDim: 0.72,
    hueRotatePerDay: 1.0,
    hueShiftPerYear: 1.0,
    speedDay: 1.35, speedNight: 0.7, speedSeason: 0.2,
    gmuSeasonSwing: 0.012,
    batteryThrottle: true, batteryLowLevel: 0.30, batteryFps: 20,
  },
};

// Lenia presets. rings = list of [mu, sigma, peak] concentric kernel rings.
// agitation = tiny per-step noise that prevents the field from freezing solid.
const LENIA_PRESETS = [
  { name: 'Flux',     R: 14, dt: 0.14, gmu: 0.15, gsig: 0.020,
    rings: [[0.5, 0.15, 1.0]], agitation: 0.012 },
  { name: 'Orbium',   R: 13, dt: 0.10, gmu: 0.15, gsig: 0.017,
    rings: [[0.5, 0.15, 1.0]], agitation: 0.0 },
  { name: 'Geminium', R: 18, dt: 0.12, gmu: 0.26, gsig: 0.036,
    rings: [[0.1667, 0.0667, 0.5], [0.5, 0.0667, 1.0], [0.8333, 0.0667, 0.667]], agitation: 0.0 },
  { name: 'Pulse',    R: 16, dt: 0.13, gmu: 0.14, gsig: 0.015,
    rings: [[0.5, 0.12, 1.0]], agitation: 0.02 },
];

// Gray-Scott presets (F, k). These are reliably fluid and ever-moving.
const GS_PRESETS = [
  { name: 'Mitosis',  F: 0.0367, k: 0.0649 },
  { name: 'Coral',    F: 0.0545, k: 0.062  },
  { name: 'Worms',    F: 0.058,  k: 0.065  },
  { name: 'Waves',    F: 0.014,  k: 0.054  },
  { name: 'Solitons', F: 0.030,  k: 0.062  },
];

// Inigo-Quilez cosine palettes: colour = a + b*cos(2pi*(c*t + d)).
const PALETTES = [
  { name: 'Ocean',    a: [0.5,0.5,0.5], b: [0.5,0.5,0.5], c: [1.0,1.0,1.0], d: [0.30,0.20,0.20] },
  { name: 'Candy',    a: [0.5,0.5,0.5], b: [0.5,0.5,0.5], c: [2.0,1.0,0.0], d: [0.50,0.20,0.25] },
  { name: 'Fire',     a: [0.5,0.5,0.5], b: [0.5,0.5,0.5], c: [2.0,1.0,1.0], d: [0.00,0.25,0.25] },
  { name: 'Lime',     a: [0.5,0.5,0.5], b: [0.5,0.5,0.5], c: [1.0,1.0,0.5], d: [0.80,0.90,0.30] },
  { name: 'Spectrum', a: [0.5,0.5,0.5], b: [0.5,0.5,0.5], c: [1.0,1.0,1.0], d: [0.00,0.33,0.67] },
];

/* ===========================================================================
   Runtime state
   =========================================================================== */
const state = {
  rule: CONFIG.rule,
  leniaIdx: CONFIG.leniaPreset,
  gsIdx: CONFIG.gsPreset,
  palIdx: CONFIG.palette,
};
const leniaP = () => LENIA_PRESETS[state.leniaIdx];
const gsP    = () => GS_PRESETS[state.gsIdx];
const palP   = () => PALETTES[state.palIdx];

/* ===========================================================================
   WebGL plumbing
   =========================================================================== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, depth: false,
                                         powerPreference: 'low-power', premultipliedAlpha: false });
if (!gl) { document.getElementById('fallback').style.display = 'grid'; throw new Error('WebGL2 unavailable'); }

const extCBF = gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_half_float_linear'); // nice-to-have; bicubic makes us robust without it
if (!extCBF) {
  const f = document.getElementById('fallback');
  f.style.display = 'grid';
  f.textContent = "This GPU/browser can't render to float textures. Try a recent Safari/Chrome/Firefox.";
  throw new Error('EXT_color_buffer_float unavailable');
}

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error('Shader compile error:\n' + gl.getShaderInfoLog(s) + '\n\n' + src);
  return s;
}
function program(vsrc, fsrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error('Program link error:\n' + gl.getProgramInfoLog(p));
  p._cache = {};
  p._u = name => (name in p._cache) ? p._cache[name] : (p._cache[name] = gl.getUniformLocation(p, name));
  return p;
}

// Fullscreen triangle from gl_VertexID — no vertex buffers.
const VERT = `#version 300 es
void main() {
  vec2 p = vec2(float((gl_VertexID << 1) & 2), float(gl_VertexID & 2));
  gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);
}`;

const COMMON = `
precision highp float;
uniform sampler2D uState;
uniform vec2  uTexel;       // 1.0 / simSize
uniform float uTime;
uniform vec2  uSeedCenter;  // sim pixels
uniform float uSeedRadius;  // sim pixels (0 = no stamp)
uniform float uSeedAmount;  // 0..1
uniform float uSeedBlob;    // soup blob size in sim pixels
out vec4 outColor;

float hash(vec2 p) { p = fract(p * vec2(123.34, 345.45)); p += dot(p, p + 34.345); return fract(p.x * p.y); }
bool inStamp() {
  if (uSeedRadius <= 0.0 || uSeedAmount <= 0.0) return false;
  return distance(gl_FragCoord.xy, uSeedCenter) <= uSeedRadius;
}`;

// ---- Lenia (multi-ring kernel + agitation) ---------------------------------
const FRAG_LENIA = `#version 300 es
${COMMON}
uniform float uR, uGmu, uGsig, uDt, uAgitation;
uniform int   uRingCount;
uniform vec3  uRings[4];     // (mu, sigma, peak) per ring

void main() {
  vec2 uv = gl_FragCoord.xy * uTexel;
  float a = texture(uState, uv).r;

  float sum = 0.0, wsum = 0.0;
  int iR = int(ceil(uR));
  for (int dy = -iR; dy <= iR; dy++) {
    for (int dx = -iR; dx <= iR; dx++) {
      vec2 off = vec2(float(dx), float(dy));
      float d = length(off) / uR;
      if (d <= 1.0) {
        float k = 0.0;
        for (int ri = 0; ri < uRingCount; ri++) {
          vec3 r = uRings[ri];
          k += r.z * exp(-0.5 * pow((d - r.x) / r.y, 2.0));
        }
        sum += k * texture(uState, uv + off * uTexel).r;  // REPEAT-wrapped
        wsum += k;
      }
    }
  }
  float u = sum / max(wsum, 1e-9);
  float g = 2.0 * exp(-0.5 * pow((u - uGmu) / uGsig, 2.0)) - 1.0;
  float na = clamp(a + uDt * g, 0.0, 1.0);

  // Tiny agitation keeps the field from settling into static blobs.
  if (uAgitation > 0.0)
    na = clamp(na + (hash(gl_FragCoord.xy * 0.37 + uTime * 11.0) - 0.5) * uAgitation, 0.0, 1.0);

  if (inStamp()) {
    vec2 cell = floor(gl_FragCoord.xy / uSeedBlob);
    float soup = hash(cell) > 0.55 ? hash(cell + 11.7 + floor(uTime)) : 0.0;
    na = mix(na, soup, uSeedAmount);
  }
  outColor = vec4(na, 0.0, 0.0, 1.0);
}`;

// ---- Gray-Scott ------------------------------------------------------------
const FRAG_GS = `#version 300 es
${COMMON}
uniform float uDu, uDv, uF, uK, uDt;
vec2 S(vec2 o) { return texture(uState, gl_FragCoord.xy * uTexel + o * uTexel).rg; }
void main() {
  vec2 c = S(vec2(0.0));
  vec2 lap = S(vec2(-1.,-1.))*0.05 + S(vec2(0.,-1.))*0.2 + S(vec2(1.,-1.))*0.05
           + S(vec2(-1., 0.))*0.2  + c*(-1.0)            + S(vec2(1., 0.))*0.2
           + S(vec2(-1., 1.))*0.05 + S(vec2(0., 1.))*0.2 + S(vec2(1., 1.))*0.05;
  float u = c.r, v = c.g, uvv = u * v * v;
  u += (uDu * lap.r - uvv + uF * (1.0 - u)) * uDt;
  v += (uDv * lap.g + uvv - (uF + uK) * v) * uDt;
  u = clamp(u, 0.0, 1.0); v = clamp(v, 0.0, 1.0);
  if (inStamp()) {
    vec2 cell = floor(gl_FragCoord.xy / uSeedBlob);
    if (hash(cell + floor(uTime)) > 0.55) { u = mix(u, 0.5, uSeedAmount); v = mix(v, 0.5, uSeedAmount); }
  }
  outColor = vec4(u, v, 0.0, 1.0);
}`;

// ---- Colour / display: bicubic upscale + black background + bloom ----------
const FRAG_COLOR = `#version 300 es
precision highp float;
uniform sampler2D uState;
uniform vec2  uResolution;
uniform vec2  uSimSize;       // sim grid size in texels
uniform vec2  uSimTexel;      // 1.0 / uSimSize
uniform vec2  uChannelMask;   // (1,0) lenia / (0,1) gray-scott
uniform float uGain, uGamma, uVignette, uBrightness, uExposure, uGlow;
uniform vec3  uPalA, uPalB, uPalC, uPalD;
out vec4 outColor;

vec3 palette(float t) { return uPalA + uPalB * cos(6.28318530718 * (uPalC * t + uPalD)); }

// Cheap (bilinear/nearest) field sample, used for the soft bloom.
float field(vec2 uv) { return dot(texture(uState, uv).rg, uChannelMask); }

// Exact texel fetch with wrap, for smooth bicubic upscaling.
float fetch(ivec2 p) {
  ivec2 s = ivec2(uSimSize);
  p = ((p % s) + s) % s;
  return dot(texelFetch(uState, p, 0).rg, uChannelMask);
}
vec4 catmull(float x) {
  float x2 = x * x, x3 = x2 * x;
  return vec4(-0.5*x3 + x2 - 0.5*x,
               1.5*x3 - 2.5*x2 + 1.0,
              -1.5*x3 + 2.0*x2 + 0.5*x,
               0.5*x3 - 0.5*x2);
}
float fieldCubic(vec2 uv) {
  vec2 coord = uv * uSimSize - 0.5;
  vec2 f = fract(coord);
  ivec2 i = ivec2(floor(coord));
  vec4 wx = catmull(f.x), wy = catmull(f.y);
  float r = 0.0;
  for (int m = -1; m <= 2; m++) {
    float row = 0.0;
    for (int n = -1; n <= 2; n++) row += wx[n + 1] * fetch(i + ivec2(n, m));
    r += wy[m + 1] * row;
  }
  return r;
}

vec3 shade(float v) {
  float t = clamp(v * uGain, 0.0, 1.0);
  return palette(t) * pow(t, uGamma);   // empty (t=0) -> black
}

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec3 col = shade(clamp(fieldCubic(uv), 0.0, 1.0));

  if (uGlow > 0.0) {                      // soft bloom from a blurred field
    vec2 o = uSimTexel * 1.5;
    float b = field(uv+vec2(o.x,0.)) + field(uv-vec2(o.x,0.))
            + field(uv+vec2(0.,o.y)) + field(uv-vec2(0.,o.y))
            + field(uv+o) + field(uv-o)
            + field(uv+vec2(o.x,-o.y)) + field(uv+vec2(-o.x,o.y));
    col += shade(b * 0.125) * uGlow;
  }

  col *= uExposure * uBrightness;
  vec2 q = uv - 0.5;
  col *= 1.0 - uVignette * dot(q, q) * 2.0;
  outColor = vec4(max(col, 0.0), 1.0);
}`;

// Build both sim programs up front so switching is instant.
const progLenia = program(VERT, FRAG_LENIA);
const progGS    = program(VERT, FRAG_GS);
const progColor = program(VERT, FRAG_COLOR);
const simProg = () => state.rule === 'gray-scott' ? progGS : progLenia;

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

/* ===========================================================================
   Ping-pong float textures
   =========================================================================== */
let texA, texB, simW, simH, src, dst;

function makeTarget(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RG16F, w, h, 0, gl.RG, gl.HALF_FLOAT, null);
  // NEAREST is fine: the display pass does its own smooth bicubic upscaling.
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fbo };
}

function allocate() {
  const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxDPR);
  canvas.width = Math.max(2, Math.floor(window.innerWidth * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));

  let w = Math.max(8, Math.floor(canvas.width * CONFIG.simScale));
  let h = Math.max(8, Math.floor(canvas.height * CONFIG.simScale));
  const longAxis = Math.max(w, h);
  if (longAxis > CONFIG.maxSimDim) {
    const s = CONFIG.maxSimDim / longAxis;
    w = Math.max(8, Math.floor(w * s)); h = Math.max(8, Math.floor(h * s));
  }
  simW = w; simH = h;

  if (texA) { gl.deleteTexture(texA.tex); gl.deleteFramebuffer(texA.fbo); }
  if (texB) { gl.deleteTexture(texB.tex); gl.deleteFramebuffer(texB.fbo); }
  texA = makeTarget(w, h); texB = makeTarget(w, h);
  clearAndSeed();
}

function clearAndSeed() {
  const base = state.rule === 'gray-scott' ? [1, 0, 0, 1] : [0, 0, 0, 1];
  for (const t of [texA, texB]) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, t.fbo);
    gl.clearColor(base[0], base[1], base[2], base[3]);
    gl.clear(gl.COLOR_BUFFER_BIT);
  }
  src = texA; dst = texB;
  pendingSeed = { cx: simW / 2, cy: simH / 2, r: Math.max(simW, simH), amount: 1.0 };
  lastReseed = performance.now() / 1000;
}

/* ===========================================================================
   Date/time-driven look (offline). Off by default; toggle with S.
   =========================================================================== */
let battery = null;
if (navigator.getBattery) navigator.getBattery().then(b => { battery = b; }).catch(() => {});

const look = { palA: [.5,.5,.5], palB: [.5,.5,.5], palC: [1,1,1], palD: [0,.33,.67], brightness: 1.0 };
const dyn  = { speed: 1.0, gmuShift: 0.0 };

function yearFraction(d) {
  const start = new Date(d.getFullYear(), 0, 1), end = new Date(d.getFullYear() + 1, 0, 1);
  return (d - start) / (end - start);
}

function updateLook() {
  const p = palP();
  look.palA = p.a; look.palB = p.b; look.palC = p.c;
  const sd = CONFIG.systemData;
  if (!sd.enabled) {
    look.palD = p.d; look.brightness = 1.0; dyn.speed = 1.0; dyn.gmuShift = 0.0;
    return CONFIG.fps;
  }
  const now = new Date();
  const tod = (now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds()) / 86400;
  const day = 0.5 - 0.5 * Math.cos(tod * 2 * Math.PI);
  const yr = yearFraction(now);
  const season = Math.sin(yr * 2 * Math.PI);

  look.brightness = sd.nightDim + (1 - sd.nightDim) * day;
  const rawSpeed = sd.speedNight + (sd.speedDay - sd.speedNight) * day + sd.speedSeason * season;
  dyn.speed = Math.max(0.5, Math.min(1.4, rawSpeed));
  dyn.gmuShift = sd.gmuSeasonSwing * season;

  const hue = tod * sd.hueRotatePerDay + yr * sd.hueShiftPerYear;
  look.palD = [p.d[0] + hue, p.d[1] + hue, p.d[2] + hue];

  let fps = CONFIG.fps;
  if (sd.batteryThrottle && battery && !battery.charging && battery.level < sd.batteryLowLevel) fps = sd.batteryFps;
  return fps;
}

/* ===========================================================================
   Render loop
   =========================================================================== */
let pendingSeed = null, lastReseed = 0;

function setSeedUniforms(p) {
  gl.uniform1i(p._u('uState'), 0);
  gl.uniform2f(p._u('uTexel'), 1 / simW, 1 / simH);
  gl.uniform1f(p._u('uTime'), performance.now() / 1000);
  gl.uniform1f(p._u('uSeedBlob'), Math.max(3, (state.rule === 'lenia' ? leniaP().R * 0.5 : 5)));
  if (pendingSeed) {
    gl.uniform2f(p._u('uSeedCenter'), pendingSeed.cx, pendingSeed.cy);
    gl.uniform1f(p._u('uSeedRadius'), pendingSeed.r);
    gl.uniform1f(p._u('uSeedAmount'), pendingSeed.amount);
  } else {
    gl.uniform1f(p._u('uSeedRadius'), 0); gl.uniform1f(p._u('uSeedAmount'), 0);
  }
}

const ringBuf = new Float32Array(12);
function simStep() {
  const p = simProg();
  gl.useProgram(p);
  gl.viewport(0, 0, simW, simH);
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, src.tex);
  setSeedUniforms(p);

  if (state.rule === 'gray-scott') {
    const g = gsP();
    gl.uniform1f(p._u('uDu'), 1.0); gl.uniform1f(p._u('uDv'), 0.5);
    gl.uniform1f(p._u('uF'), g.F);  gl.uniform1f(p._u('uK'), g.k);
    gl.uniform1f(p._u('uDt'), 1.0 * Math.min(dyn.speed, 1.4));
  } else {
    const l = leniaP();
    ringBuf.fill(0);
    for (let i = 0; i < l.rings.length && i < 4; i++) {
      ringBuf[i*3] = l.rings[i][0]; ringBuf[i*3+1] = l.rings[i][1]; ringBuf[i*3+2] = l.rings[i][2];
    }
    gl.uniform3fv(p._u('uRings'), ringBuf);
    gl.uniform1i(p._u('uRingCount'), Math.min(l.rings.length, 4));
    gl.uniform1f(p._u('uR'), l.R);
    gl.uniform1f(p._u('uGmu'), l.gmu + dyn.gmuShift);
    gl.uniform1f(p._u('uGsig'), l.gsig);
    gl.uniform1f(p._u('uDt'), l.dt * dyn.speed);
    gl.uniform1f(p._u('uAgitation'), l.agitation || 0.0);
  }

  gl.drawArrays(gl.TRIANGLES, 0, 3);
  pendingSeed = null;
  [src, dst] = [dst, src];
}

function display() {
  const lk = CONFIG.look;
  gl.useProgram(progColor);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(progColor._u('uState'), 0);
  gl.uniform2f(progColor._u('uResolution'), canvas.width, canvas.height);
  gl.uniform2f(progColor._u('uSimSize'), simW, simH);
  gl.uniform2f(progColor._u('uSimTexel'), 1 / simW, 1 / simH);
  gl.uniform2f(progColor._u('uChannelMask'), state.rule === 'gray-scott' ? 0 : 1,
                                             state.rule === 'gray-scott' ? 1 : 0);
  gl.uniform1f(progColor._u('uGain'), lk.gain);
  gl.uniform1f(progColor._u('uGamma'), lk.gamma);
  gl.uniform1f(progColor._u('uExposure'), lk.exposure);
  gl.uniform1f(progColor._u('uGlow'), lk.glow);
  gl.uniform1f(progColor._u('uVignette'), lk.vignette);
  gl.uniform1f(progColor._u('uBrightness'), look.brightness);
  gl.uniform3fv(progColor._u('uPalA'), look.palA);
  gl.uniform3fv(progColor._u('uPalB'), look.palB);
  gl.uniform3fv(progColor._u('uPalC'), look.palC);
  gl.uniform3fv(progColor._u('uPalD'), look.palD);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

let running = true, lastFrame = 0;
function frame(tMs) {
  if (!running) return;            // chain self-stops when paused
  requestAnimationFrame(frame);
  const fps = updateLook();
  if (tMs - lastFrame < 1000 / fps) return;
  lastFrame = tMs;

  const time = tMs / 1000, rs = CONFIG.reseed;
  if (!pendingSeed && time - lastReseed > rs.intervalSec) {
    lastReseed = time;
    if (Math.random() < rs.probability)
      pendingSeed = { cx: Math.random()*simW, cy: Math.random()*simH,
                      r: rs.radiusFrac * Math.min(simW, simH), amount: rs.amount };
  }
  const steps = CONFIG.stepsPerFrame[state.rule] || 1;
  for (let i = 0; i < steps; i++) simStep();
  display();
}

/* ===========================================================================
   On-screen hint + live controls
   =========================================================================== */
const hud = document.getElementById('hud');
let hudTimer = null;
function showHud(ms = 4000) {
  const name = state.rule === 'gray-scott' ? `Gray-Scott · ${gsP().name}` : `Lenia · ${leniaP().name}`;
  const sd = CONFIG.systemData.enabled ? 'on' : 'off';
  hud.innerHTML = `<b>${name}</b> &nbsp;·&nbsp; Palette: <b>${palP().name}</b> &nbsp;·&nbsp; date/time fx: <b>${sd}</b>`
    + `<br><span class="keys">[G] system &nbsp; [P] preset &nbsp; [C] palette &nbsp; [S] date/time fx &nbsp; [R] reseed &nbsp; [Space] pause &nbsp; [H] hide</span>`;
  hud.style.opacity = '1';
  clearTimeout(hudTimer);
  if (ms) hudTimer = setTimeout(() => { hud.style.opacity = '0'; }, ms);
}

window.addEventListener('keydown', e => {
  switch (e.key.toLowerCase()) {
    case 'g': state.rule = state.rule === 'lenia' ? 'gray-scott' : 'lenia'; clearAndSeed(); showHud(); break;
    case 'p':
      if (state.rule === 'lenia') state.leniaIdx = (state.leniaIdx + 1) % LENIA_PRESETS.length;
      else state.gsIdx = (state.gsIdx + 1) % GS_PRESETS.length;
      clearAndSeed(); showHud(); break;
    case 'c': state.palIdx = (state.palIdx + 1) % PALETTES.length; showHud(); break;
    case 's': CONFIG.systemData.enabled = !CONFIG.systemData.enabled; showHud(); break;
    case 'r': clearAndSeed(); showHud(); break;
    case 'h': hud.style.opacity = hud.style.opacity === '1' ? '0' : (showHud(0), '1'); break;
    case ' ':
      e.preventDefault();
      if (running) { running = false; }
      else { running = true; requestAnimationFrame(frame); }
      showHud(); break;
  }
});
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  pendingSeed = { cx: (e.clientX - rect.left) / rect.width * simW,
                  cy: (1 - (e.clientY - rect.top) / rect.height) * simH,
                  r: CONFIG.reseed.radiusFrac * Math.min(simW, simH), amount: CONFIG.reseed.amount };
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { running = false; }
  else if (!running) { running = true; requestAnimationFrame(frame); }
});
let resizeTimer = null;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(allocate, 200); });

allocate();
showHud(6000);          // greet with the controls
requestAnimationFrame(frame);
</script>
</body>
</html>
