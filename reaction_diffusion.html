<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Reaction–Diffusion — continuous living cells (GPU)</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  #c { display: block; width: 100vw; height: 100vh; }
  #fallback {
    position: fixed; inset: 0; display: none; place-items: center;
    color: #9aa; font: 14px/1.5 -apple-system, system-ui, sans-serif; text-align: center; padding: 2rem;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fallback">This needs WebGL2.<br />Open in a recent Safari, Chrome, or Firefox.</div>

<script>
"use strict";
/* ===========================================================================
   Reaction–Diffusion (Gray–Scott) — discrete cells, continuous state, and it
   NEVER freezes.

   The journey here, recorded so the next reader doesn't repeat it:

     index.html        Particle Lenia. Beautiful, but the physics runs in JS on
                       the CPU every frame — exactly the cost we wanted to cut.
     (SmoothLife try)  Grid-based SmoothLife on the GPU. CPU went idle as hoped,
                       but it RELAXED INTO A STATIC TURING PATTERN (spots /
                       labyrinths) within seconds. This is structural, not a
                       tuning bug: SmoothLife / grid-Lenia are *relaxational* —
                       every cell descends to a steady value and the lattice
                       locks into a fixed point. The repo README warns of exactly
                       this. Sprinkling noise only dithers a dead pattern.

   The particle version dodged freezing with ACTIVE MATTER (self-propulsion ⇒
   no equilibrium exists). The grid analogue is reaction–diffusion: two chemicals
   U and V diffuse and react (U + 2V → 3V, plus feed/kill). It is an open,
   driven system — it does not relax to a fixed point but sustains travelling,
   splitting, branching localized structures ("creatures"). It is also far
   CHEAPER than SmoothLife: a 9-tap Laplacian per cell instead of a ~500-tap
   convolution. The entire simulation is a fragment shader; the CPU just issues
   draw calls and sleeps.

     ∂U/∂t = Dᵤ·∇²U − U·V² + F·(1 − U)        (feed U at rate F)
     ∂V/∂t = D_v·∇²V + U·V² − (F + k)·V        (kill V at rate F+k)

   To GUARANTEE it never globally settles, F and k vary across the grid: every
   region sits in a different behavioural regime (spots, worms, mitosis, chaos),
   so the boundaries between regimes are perpetually unstable and churn forever.
   A whisper of noise keeps any locally-quiet patch from perfectly freezing.
   =========================================================================== */

const CONFIG = {
  // Simulation grid height in CELLS (width follows aspect). Fixed and
  // independent of screen resolution, so GPU cost is constant and the CPU
  // stays idle. Upscaled to the screen with linear filtering. RD is cheap
  // (a 9-tap Laplacian per cell), so this can go high — finer, more numerous
  // creatures. NB creature size is a fixed number of CELLS, so raising this
  // shrinks each creature on screen; to keep big creatures at high detail,
  // raise this AND scale Du/Dv up together (and add substeps to stay stable,
  // Du·dt < 0.25). 768–1024 is fine on a desktop GPU.
  gridHeight: 720,
  maxDPR: 2.0,       // render the colour pass at up to 2× device pixels (sharper
                     //   edges; the sim grid is unaffected and stays cheap)

  // Gray–Scott diffusion + timestep. Established values from the widely-used
  // pmneila / Karl-Sims WebGL setups: 2:1 diffusion ratio with the 9-point
  // Laplacian and dt=1 (stable while Dᵤ·dt < 0.25). The actual feed/kill (F,k)
  // presets live in regimePath() in the shader and are the documented dynamic
  // regimes (worms / solitons / mitosis / u-skate gliders).
  Du: 0.16, Dv: 0.08, dt: 1.0,

  // A single smooth, isotropic field (fbm in the shader) DRIFTS over space and
  // time, choosing where along the dynamic regime arc each cell sits. So the
  // regime map is fluid — regions migrate and morph — while staying on live
  // regimes everywhere (no dead patches, no axis bias).
  fieldScale: 2.6,   // larger = smaller regime blobs (more of them on screen)
  fieldDrift: 0.10,  // how fast the regime field flows (lower = more languid)

  noise: 0.0020,   // tiny jitter into V each step — anti-freeze + lets dead
                   //   regions re-ignite when a living regime drifts back over them
  seedDisks: 80,   // random V blobs to ignite the reaction
  substeps: 12,    // sim steps per displayed frame — more = faster evolution
                   //   (RD is cheap, so this is nearly free)
  fps: 30,
};

/* ===========================================================================
   WebGL plumbing
   =========================================================================== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, depth: false,
                                         powerPreference: 'low-power', premultipliedAlpha: false });
if (!gl) { document.getElementById('fallback').style.display = 'grid'; throw new Error('WebGL2 unavailable'); }
if (!gl.getExtension('EXT_color_buffer_float')) {
  const f = document.getElementById('fallback');
  f.style.display = 'grid';
  f.textContent = "This GPU/browser can't render to float textures. Try a recent Safari/Chrome/Firefox.";
  throw new Error('EXT_color_buffer_float unavailable');
}

function compile(t, s) {
  const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh) + '\n' + s);
  return sh;
}
function program(v, f) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, v));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, f));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  p._c = {}; p._u = n => (n in p._c) ? p._c[n] : (p._c[n] = gl.getUniformLocation(p, n));
  return p;
}

const FS_TRI_V = `#version 300 es
void main(){ vec2 p = vec2(float((gl_VertexID<<1)&2), float(gl_VertexID&2)); gl_Position = vec4(p*2.0-1.0,0.,1.); }`;

// Gray–Scott step. Reads {U,V} from RG of the previous texture, writes the next.
const SIM_F = `#version 300 es
precision highp float;
out vec4 o;
uniform sampler2D uState;
uniform float uDu, uDv, uDt, uNoise, uStep;
uniform float uTime, uSeed, uFieldScale, uFieldDrift;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

// Feed/kill presets along the documented DYNAMIC tongue of Gray–Scott (Pearson
// 1993 / Munafo). The interesting "creature" behaviours live on a narrow curved
// arc in (F,k) space — NOT a rectangle — so we vary a single parameter t that
// walks along that arc. Every value of t is therefore a known live regime.
// We sit on the DENSE, fast end of the tongue: low-k chaos/labyrinth → worms →
// maze → dividing worms. (Higher k — solitons/mitosis/u-skate gliders — is
// genuinely sparse and slow, so we avoid it here.)
vec2 regimePath(float t){
  t = clamp(t, 0.0, 1.0) * 3.0;
  vec2 a, b; float f;
  if      (t < 1.0) { a = vec2(0.024, 0.0530); b = vec2(0.030, 0.0560); f = t;        }
  else if (t < 2.0) { a = vec2(0.030, 0.0560); b = vec2(0.035, 0.0580); f = t - 1.0;  }
  else              { a = vec2(0.035, 0.0580); b = vec2(0.042, 0.0600); f = t - 2.0;  }
  return mix(a, b, smoothstep(0.0, 1.0, f));   // (F, k)
}

// Smooth, isotropic, slowly-drifting scalar field in ~[0,1]. Built from a few
// plane waves at evenly-spread angles (so there is NO axis bias — statistically
// the same in every direction) whose phases creep with time. This is what makes
// the regime map fluid: sampling F and k from this field means the behavioural
// regions migrate across the screen and morph instead of sitting in fixed
// corners. 'seed' decorrelates the two fields (one for F, one for k) and
// randomises the layout per page load.
float fbm(vec2 p, float t, float seed){
  float s = 0.0, amp = 0.0;
  for (int i = 0; i < 5; i++){
    float fi = float(i);
    float ang = seed * 6.2831853 + fi * 1.2566371;        // 72° apart, rotated by seed
    vec2 dir = vec2(cos(ang), sin(ang));
    float freq = uFieldScale * pow(1.6, fi);              // octaves: rising spatial freq
    float spd  = uFieldDrift * (1.0 + 0.4 * fi);          // finer octaves drift faster
    float w    = pow(0.6, fi);                            // ... and weigh less (fbm)
    s   += w * sin(dot(p, dir) * freq + t * spd + seed * 17.0 + fi * 2.399);
    amp += w;
  }
  // contrast-stretch a little so the field actually visits the regime extremes
  float v = s / amp * 0.5 + 0.5;
  return clamp((v - 0.5) * 1.35 + 0.5, 0.0, 1.0);
}

void main(){
  ivec2 sz = textureSize(uState, 0);
  ivec2 c  = ivec2(gl_FragCoord.xy);
  // Toroidal neighbour fetch.
  #define S(dx,dy) texelFetch(uState, ivec2((c.x+(dx)+sz.x)%sz.x, (c.y+(dy)+sz.y)%sz.y), 0).rg
  vec2 cc = S(0,0);
  vec2 l = S(-1,0), r = S(1,0), d = S(0,-1), u = S(0,1);
  vec2 ul = S(-1,1), ur = S(1,1), dl = S(-1,-1), dr = S(1,-1);
  // 9-point isotropic Laplacian (weights sum to 0).
  vec2 lap = -cc + 0.2*(l+r+u+d) + 0.05*(ul+ur+dl+dr);

  float U = cc.r, V = cc.g;
  // Fluid feed/kill: a single drifting isotropic field picks WHERE along the
  // dynamic regime arc each cell sits, so the screen spans worms → solitons →
  // mitosis → gliders, the regions migrate and morph over time, and every cell
  // is always on a live regime (no dead/static patches). Isotropic units
  // (divide by height) so the regime blobs are round, not stretched.
  vec2 pos = (vec2(c) + 0.5) / float(sz.y);
  float regime = fbm(pos, uTime, uSeed);   // 0..1, position along the arc
  vec2 Fk = regimePath(regime);
  float F = Fk.x, k = Fk.y;

  float uvv = U * V * V;
  float dV  = uDt * (uDv * lap.g + uvv - (F + k) * V);   // deterministic ∂V/∂t·dt
  float nU  = U + uDt * (uDu * lap.r - uvv + F * (1.0 - U));
  float nV  = V + dV;
  nV += (hash(vec2(c) + uStep) - 0.5) * uNoise;   // anti-freeze whisper

  // Reaction activity: |∂V/∂t| (excludes noise so it's the real growth/decay
  // rate). A leaky-max trail so freshly-reacting edges glow then fade — this is
  // the "where is it alive right now" channel the colour pass uses for rim light.
  float prevA = texelFetch(uState, c, 0).a;
  float act = max(prevA * 0.90, clamp(abs(dV) * 28.0, 0.0, 1.0));

  o = vec4(clamp(nU, 0.0, 1.0), clamp(nV, 0.0, 1.0), regime, act);
}`;

// Display: colour is a function of three pieces of state, not just V —
//   intensity  ← V (mass)                : how bright / how far up the ramp
//   hue/temp   ← regime (the k-field)    : WHICH palette, so calm vs chaotic
//                                          regions read differently and the
//                                          colours flow as the regime field does
//   rim light  ← reaction activity |∂V/∂t|: the growing membranes glow; static
//                                          interiors stay matte
const DISP_F = `#version 300 es
precision highp float;
out vec4 outColor;
uniform sampler2D uState;
uniform vec2 uRes;
uniform float uVignette;

// Generic 6-stop ramp evaluator.
vec3 ramp(float t, vec3 a, vec3 b, vec3 c, vec3 d, vec3 e, vec3 f){
  t = clamp(t, 0.0, 1.0);
  if (t < 0.2) return mix(a, b, t / 0.2);
  if (t < 0.4) return mix(b, c, (t - 0.2) / 0.2);
  if (t < 0.6) return mix(c, d, (t - 0.4) / 0.2);
  if (t < 0.8) return mix(d, e, (t - 0.6) / 0.2);
  return mix(e, f, (t - 0.8) / 0.2);
}
// Cool palette — calm / spotty regimes: ink → teal → aqua → pale ice.
vec3 cool(float t){ return ramp(t,
  vec3(0.01,0.02,0.06), vec3(0.03,0.12,0.26), vec3(0.00,0.34,0.45),
  vec3(0.10,0.62,0.60), vec3(0.55,0.88,0.80), vec3(0.92,0.99,0.98)); }
// Warm palette — chaotic / wormy regimes: ink → plum → crimson → amber → white.
vec3 warm(float t){ return ramp(t,
  vec3(0.04,0.01,0.06), vec3(0.28,0.05,0.30), vec3(0.62,0.10,0.30),
  vec3(0.90,0.31,0.16), vec3(0.99,0.70,0.24), vec3(1.00,0.98,0.90)); }

void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  vec4 s = texture(uState, uv);
  float v = s.g, regime = s.b, act = s.a;

  float t = pow(clamp(v * 2.4, 0.0, 1.0), 0.8);          // intensity from mass
  // Blend palettes by regime — smoothstep keeps the transition organic, and a
  // tiny v-term lets denser structure read slightly "warmer" within a region.
  float warmth = clamp(smoothstep(0.35, 0.75, regime) + 0.15 * v, 0.0, 1.0);
  vec3 col = mix(cool(t), warm(t), warmth);

  // Rim light on actively-reacting edges (the autocatalytic growth front).
  col += act * smoothstep(0.04, 0.30, v) * vec3(1.00, 0.92, 0.72) * 0.9;

  vec2 q = uv - 0.5; col *= 1.0 - uVignette * dot(q, q) * 2.0;
  outColor = vec4(max(col, 0.0), 1.0);
}`;

const progSim  = program(FS_TRI_V, SIM_F);
const progDisp = program(FS_TRI_V, DISP_F);
const triVao = gl.createVertexArray();

/* ===========================================================================
   Ping-pong state textures (RG = {U, V}) + framebuffers
   =========================================================================== */
let gridW, gridH;
let tex = [null, null], fbo = [null, null], src = 0;

function makeTex(w, h, data) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.FLOAT, data);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}

// Seed: U=1, V=0 everywhere (RGBA = U,V,regime,activity), then random blobs of
// V to ignite the reaction. B/A are written by the sim; their seed values don't
// matter (overwritten on step 1).
function seed() {
  const a = new Float32Array(gridW * gridH * 4);
  for (let i = 0; i < gridW * gridH; i++) { a[i*4] = 1.0; }
  for (let d = 0; d < CONFIG.seedDisks; d++) {
    const cx = Math.random() * gridW, cy = Math.random() * gridH;
    const rr = 3 + Math.random() * 7;
    const x0 = Math.floor(cx - rr), x1 = Math.ceil(cx + rr);
    const y0 = Math.floor(cy - rr), y1 = Math.ceil(cy + rr);
    for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
      const dx = x - cx, dy = y - cy;
      if (dx*dx + dy*dy > rr*rr) continue;
      const gx = ((x % gridW) + gridW) % gridW, gy = ((y % gridH) + gridH) % gridH;
      const idx = (gx + gy * gridW) * 4;
      a[idx] = 0.5; a[idx+1] = 0.25;
    }
  }
  return a;
}

function allocate() {
  const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxDPR);
  canvas.width  = Math.max(2, Math.floor(window.innerWidth  * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));

  gridH = CONFIG.gridHeight;
  gridW = Math.max(1, Math.round(gridH * (canvas.width / canvas.height)));

  for (const t of tex) if (t) gl.deleteTexture(t);
  for (const f of fbo) if (f) gl.deleteFramebuffer(f);
  tex[0] = makeTex(gridW, gridH, seed());
  tex[1] = makeTex(gridW, gridH, null);
  for (let i = 0; i < 2; i++) {
    fbo[i] = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[i]);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex[i], 0);
  }
  src = 0;
}

/* ===========================================================================
   Frame: a few GPU sim steps (ping-pong) + one display blit. CPU work ≈ nil.
   =========================================================================== */
const SEED = Math.random();   // randomises the regime layout per page load

function step(stepCount, timeSec) {
  const dst = 1 - src;
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[dst]);
  gl.viewport(0, 0, gridW, gridH);
  gl.useProgram(progSim);
  gl.bindVertexArray(triVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.uniform1i(progSim._u('uState'), 0);
  gl.uniform1f(progSim._u('uDu'), CONFIG.Du);
  gl.uniform1f(progSim._u('uDv'), CONFIG.Dv);
  gl.uniform1f(progSim._u('uDt'), CONFIG.dt);
  gl.uniform1f(progSim._u('uNoise'), CONFIG.noise);
  gl.uniform1f(progSim._u('uStep'), stepCount);      // varies each step → decorrelates jitter
  gl.uniform1f(progSim._u('uTime'), timeSec);        // wall-clock seconds → drifts the regime field
  gl.uniform1f(progSim._u('uSeed'), SEED);
  gl.uniform1f(progSim._u('uFieldScale'), CONFIG.fieldScale);
  gl.uniform1f(progSim._u('uFieldDrift'), CONFIG.fieldDrift);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  src = dst;
}

function display() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(progDisp);
  gl.bindVertexArray(triVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.uniform1i(progDisp._u('uState'), 0);
  gl.uniform2f(progDisp._u('uRes'), canvas.width, canvas.height);
  gl.uniform1f(progDisp._u('uVignette'), 0.12);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

/* ===========================================================================
   Loop
   =========================================================================== */
let running = true, lastFrame = 0, t = 0;
function frame(tMs) {
  if (!running) return;
  requestAnimationFrame(frame);
  if (tMs - lastFrame < 1000 / CONFIG.fps) return;
  lastFrame = tMs;
  const timeSec = tMs / 1000;
  for (let s = 0; s < CONFIG.substeps; s++) { t += 1.0; step(t, timeSec); }
  display();
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) running = false;
  else if (!running) { running = true; lastFrame = 0; requestAnimationFrame(frame); }
});
// Click / tap to reseed.
canvas.addEventListener('pointerdown', () => {
  gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, gridW, gridH, gl.RGBA, gl.FLOAT, seed());
});
let resizeTimer = null;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(allocate, 200); });

allocate();
requestAnimationFrame(frame);
</script>
</body>
</html>
