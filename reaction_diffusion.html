<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Reaction–Diffusion — continuous living cells (GPU)</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  #c { display: block; width: 100vw; height: 100vh; }
  #fallback {
    position: fixed; inset: 0; display: none; place-items: center;
    color: #9aa; font: 14px/1.5 -apple-system, system-ui, sans-serif; text-align: center; padding: 2rem;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fallback">This needs WebGL2.<br />Open in a recent Safari, Chrome, or Firefox.</div>

<script>
"use strict";
/* ===========================================================================
   Reaction–Diffusion (Gray–Scott) — discrete cells, continuous state, and it
   NEVER freezes.

   The journey here, recorded so the next reader doesn't repeat it:

     index.html        Particle Lenia. Beautiful, but the physics runs in JS on
                       the CPU every frame — exactly the cost we wanted to cut.
     (SmoothLife try)  Grid-based SmoothLife on the GPU. CPU went idle as hoped,
                       but it RELAXED INTO A STATIC TURING PATTERN (spots /
                       labyrinths) within seconds. This is structural, not a
                       tuning bug: SmoothLife / grid-Lenia are *relaxational* —
                       every cell descends to a steady value and the lattice
                       locks into a fixed point. The repo README warns of exactly
                       this. Sprinkling noise only dithers a dead pattern.

   The particle version dodged freezing with ACTIVE MATTER (self-propulsion ⇒
   no equilibrium exists). The grid analogue is reaction–diffusion: two chemicals
   U and V diffuse and react (U + 2V → 3V, plus feed/kill). It is an open,
   driven system — it does not relax to a fixed point but sustains travelling,
   splitting, branching localized structures ("creatures"). It is also far
   CHEAPER than SmoothLife: a 9-tap Laplacian per cell instead of a ~500-tap
   convolution. The entire simulation is a fragment shader; the CPU just issues
   draw calls and sleeps.

     ∂U/∂t = Dᵤ·∇²U − U·V² + F·(1 − U)        (feed U at rate F)
     ∂V/∂t = D_v·∇²V + U·V² − (F + k)·V        (kill V at rate F+k)

   To GUARANTEE it never globally settles, F and k vary across the grid: every
   region sits in a different behavioural regime (spots, worms, mitosis, chaos),
   so the boundaries between regimes are perpetually unstable and churn forever.
   A whisper of noise keeps any locally-quiet patch from perfectly freezing.
   =========================================================================== */

const CONFIG = {
  // Simulation grid height in CELLS (width follows aspect). Fixed and
  // independent of screen resolution, so GPU cost is constant and the CPU
  // stays idle. Upscaled to the screen with linear filtering.
  gridHeight: 256,

  // Gray–Scott diffusion + timestep (classic Karl-Sims values; stable for the
  // 9-point Laplacian with Dᵤ·dt < 0.25).
  Du: 0.16, Dv: 0.08, dt: 1.0,

  // Feed (F) and kill (k) rates vary across the grid so the screen spans the
  // whole Pearson zoo at once — spots, worms, loops, mitosis, spatiotemporal
  // chaos — and the interfaces between regimes never stop moving.
  //   F: top → bottom,  k: left → right.
  Fmin: 0.012, Fmax: 0.045,
  kmin: 0.045, kmax: 0.065,

  noise: 0.0015,   // tiny jitter into V each step — anti-freeze insurance
  seedDisks: 80,   // random V blobs to ignite the reaction
  substeps: 8,     // sim steps per displayed frame (RD is cheap; this animates it)
  fps: 30,
};

/* ===========================================================================
   WebGL plumbing
   =========================================================================== */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, depth: false,
                                         powerPreference: 'low-power', premultipliedAlpha: false });
if (!gl) { document.getElementById('fallback').style.display = 'grid'; throw new Error('WebGL2 unavailable'); }
if (!gl.getExtension('EXT_color_buffer_float')) {
  const f = document.getElementById('fallback');
  f.style.display = 'grid';
  f.textContent = "This GPU/browser can't render to float textures. Try a recent Safari/Chrome/Firefox.";
  throw new Error('EXT_color_buffer_float unavailable');
}

function compile(t, s) {
  const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh) + '\n' + s);
  return sh;
}
function program(v, f) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, v));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, f));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  p._c = {}; p._u = n => (n in p._c) ? p._c[n] : (p._c[n] = gl.getUniformLocation(p, n));
  return p;
}

const FS_TRI_V = `#version 300 es
void main(){ vec2 p = vec2(float((gl_VertexID<<1)&2), float(gl_VertexID&2)); gl_Position = vec4(p*2.0-1.0,0.,1.); }`;

// Gray–Scott step. Reads {U,V} from RG of the previous texture, writes the next.
const SIM_F = `#version 300 es
precision highp float;
out vec4 o;
uniform sampler2D uState;
uniform float uDu, uDv, uDt, uNoise, uTime;
uniform float uFmin, uFmax, uKmin, uKmax;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

void main(){
  ivec2 sz = textureSize(uState, 0);
  ivec2 c  = ivec2(gl_FragCoord.xy);
  // Toroidal neighbour fetch.
  #define S(dx,dy) texelFetch(uState, ivec2((c.x+(dx)+sz.x)%sz.x, (c.y+(dy)+sz.y)%sz.y), 0).rg
  vec2 cc = S(0,0);
  vec2 l = S(-1,0), r = S(1,0), d = S(0,-1), u = S(0,1);
  vec2 ul = S(-1,1), ur = S(1,1), dl = S(-1,-1), dr = S(1,-1);
  // 9-point isotropic Laplacian (weights sum to 0).
  vec2 lap = -cc + 0.2*(l+r+u+d) + 0.05*(ul+ur+dl+dr);

  float U = cc.r, V = cc.g;
  // Spatially-varying feed/kill: sweep the whole Pearson parameter map.
  vec2 nuv = (vec2(c) + 0.5) / vec2(sz);
  float F = mix(uFmin, uFmax, nuv.y);
  float k = mix(uKmin, uKmax, nuv.x);

  float uvv = U * V * V;
  float nU = U + uDt * (uDu * lap.r - uvv + F * (1.0 - U));
  float nV = V + uDt * (uDv * lap.g + uvv - (F + k) * V);
  nV += (hash(vec2(c) + uTime) - 0.5) * uNoise;   // anti-freeze whisper
  o = vec4(clamp(nU, 0.0, 1.0), clamp(nV, 0.0, 1.0), 0.0, 1.0);
}`;

// Display: upscale and heat-map the V chemical (matches the sibling wallpaper).
const DISP_F = `#version 300 es
precision highp float;
out vec4 outColor;
uniform sampler2D uState;
uniform vec2 uRes;
uniform float uVignette;
vec3 heat(float t){
  t = clamp(t, 0.0, 1.0);
  const vec3 c0 = vec3(0.00, 0.00, 0.00);
  const vec3 c1 = vec3(0.13, 0.05, 0.28);
  const vec3 c2 = vec3(0.47, 0.11, 0.42);
  const vec3 c3 = vec3(0.78, 0.20, 0.24);
  const vec3 c4 = vec3(0.96, 0.49, 0.12);
  const vec3 c5 = vec3(0.99, 0.81, 0.22);
  const vec3 c6 = vec3(1.00, 1.00, 0.96);
  if (t < 0.20) return mix(c0, c1, t / 0.20);
  if (t < 0.40) return mix(c1, c2, (t - 0.20) / 0.20);
  if (t < 0.60) return mix(c2, c3, (t - 0.40) / 0.20);
  if (t < 0.78) return mix(c3, c4, (t - 0.60) / 0.18);
  if (t < 0.91) return mix(c4, c5, (t - 0.78) / 0.13);
  return mix(c5, c6, (t - 0.91) / 0.09);
}
void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  float v = texture(uState, uv).g;
  vec3 col = heat(pow(clamp(v * 2.4, 0.0, 1.0), 0.8));
  vec2 q = uv - 0.5; col *= 1.0 - uVignette * dot(q, q) * 2.0;
  outColor = vec4(max(col, 0.0), 1.0);
}`;

const progSim  = program(FS_TRI_V, SIM_F);
const progDisp = program(FS_TRI_V, DISP_F);
const triVao = gl.createVertexArray();

/* ===========================================================================
   Ping-pong state textures (RG = {U, V}) + framebuffers
   =========================================================================== */
let gridW, gridH;
let tex = [null, null], fbo = [null, null], src = 0;

function makeTex(w, h, data) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RG16F, w, h, 0, gl.RG, gl.FLOAT, data);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}

// Seed: U=1, V=0 everywhere, then random blobs of V to ignite the reaction.
function seed() {
  const a = new Float32Array(gridW * gridH * 2);
  for (let i = 0; i < gridW * gridH; i++) { a[i*2] = 1.0; a[i*2+1] = 0.0; }
  for (let d = 0; d < CONFIG.seedDisks; d++) {
    const cx = Math.random() * gridW, cy = Math.random() * gridH;
    const rr = 3 + Math.random() * 7;
    const x0 = Math.floor(cx - rr), x1 = Math.ceil(cx + rr);
    const y0 = Math.floor(cy - rr), y1 = Math.ceil(cy + rr);
    for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
      const dx = x - cx, dy = y - cy;
      if (dx*dx + dy*dy > rr*rr) continue;
      const gx = ((x % gridW) + gridW) % gridW, gy = ((y % gridH) + gridH) % gridH;
      const idx = (gx + gy * gridW) * 2;
      a[idx] = 0.5; a[idx+1] = 0.25;
    }
  }
  return a;
}

function allocate() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  canvas.width  = Math.max(2, Math.floor(window.innerWidth  * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));

  gridH = CONFIG.gridHeight;
  gridW = Math.max(1, Math.round(gridH * (canvas.width / canvas.height)));

  for (const t of tex) if (t) gl.deleteTexture(t);
  for (const f of fbo) if (f) gl.deleteFramebuffer(f);
  tex[0] = makeTex(gridW, gridH, seed());
  tex[1] = makeTex(gridW, gridH, null);
  for (let i = 0; i < 2; i++) {
    fbo[i] = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[i]);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex[i], 0);
  }
  src = 0;
}

/* ===========================================================================
   Frame: a few GPU sim steps (ping-pong) + one display blit. CPU work ≈ nil.
   =========================================================================== */
function step(time) {
  const dst = 1 - src;
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo[dst]);
  gl.viewport(0, 0, gridW, gridH);
  gl.useProgram(progSim);
  gl.bindVertexArray(triVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.uniform1i(progSim._u('uState'), 0);
  gl.uniform1f(progSim._u('uDu'), CONFIG.Du);
  gl.uniform1f(progSim._u('uDv'), CONFIG.Dv);
  gl.uniform1f(progSim._u('uDt'), CONFIG.dt);
  gl.uniform1f(progSim._u('uNoise'), CONFIG.noise);
  gl.uniform1f(progSim._u('uTime'), time);
  gl.uniform1f(progSim._u('uFmin'), CONFIG.Fmin);
  gl.uniform1f(progSim._u('uFmax'), CONFIG.Fmax);
  gl.uniform1f(progSim._u('uKmin'), CONFIG.kmin);
  gl.uniform1f(progSim._u('uKmax'), CONFIG.kmax);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  src = dst;
}

function display() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(progDisp);
  gl.bindVertexArray(triVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.uniform1i(progDisp._u('uState'), 0);
  gl.uniform2f(progDisp._u('uRes'), canvas.width, canvas.height);
  gl.uniform1f(progDisp._u('uVignette'), 0.12);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

/* ===========================================================================
   Loop
   =========================================================================== */
let running = true, lastFrame = 0, t = 0;
function frame(tMs) {
  if (!running) return;
  requestAnimationFrame(frame);
  if (tMs - lastFrame < 1000 / CONFIG.fps) return;
  lastFrame = tMs;
  for (let s = 0; s < CONFIG.substeps; s++) { t += 1.0; step(t); }
  display();
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) running = false;
  else if (!running) { running = true; lastFrame = 0; requestAnimationFrame(frame); }
});
// Click / tap to reseed.
canvas.addEventListener('pointerdown', () => {
  gl.bindTexture(gl.TEXTURE_2D, tex[src]);
  gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, gridW, gridH, gl.RG, gl.FLOAT, seed());
});
let resizeTimer = null;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(allocate, 200); });

allocate();
requestAnimationFrame(frame);
</script>
</body>
</html>
